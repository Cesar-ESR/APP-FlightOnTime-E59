spring.application.name=flights

# ?? Base de datos ??????????????????????????????????????????
spring.datasource.url=jdbc:mysql://${DB_HOST}/${DB_FLIGHT_DELAY:flightdelay}
spring.datasource.username=${DB_USER_SQL}
spring.datasource.password=${DB_PASSWORD}

# ?? APIs externas ??????????????????????????????????????????
ml.api.url=${URL_BASE_ML}
api.market.key=${API_KEY_AIRPORTS}
weather.api.key=${API_KEY_CLIMA}

# ?? JWT (nuevo) ????????????????????????????????????????????
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ?? JPA ????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true